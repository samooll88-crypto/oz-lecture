<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YouTube Title & Thumbnail Generator</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #f7f8fc;
      color: #222;
    }

    .wrap {
      max-width: 800px;
      margin: 60px auto;
      padding: 24px;
    }

    .card {
      background: #fff;
      border-radius: 16px;
      padding: 28px;
      box-shadow: 0 8px 30px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      font-size: 32px;
      text-align: center;
    }

    p.desc {
      text-align: center;
      color: #666;
      margin-bottom: 28px;
    }

    .input-group {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
    }

    input {
      flex: 1;
      padding: 14px 16px;
      font-size: 16px;
      border: 1px solid #ddd;
      border-radius: 10px;
      outline: none;
    }

    input:focus {
      border-color: #888;
    }

    button {
      padding: 14px 20px;
      font-size: 16px;
      border: none;
      border-radius: 10px;
      background: #111;
      color: white;
      cursor: pointer;
      white-space: nowrap;
    }

    button:hover {
      opacity: 0.9;
    }

    .section {
      margin-top: 28px;
    }

    .section h2 {
      font-size: 22px;
      margin-bottom: 12px;
    }

    ul {
      padding-left: 20px;
      margin: 0;
    }

    li {
      margin-bottom: 8px;
      line-height: 1.5;
    }

    .empty {
      color: #888;
      text-align: center;
      padding: 16px 0;
    }

    @media (max-width: 640px) {
      .input-group {
        flex-direction: column;
      }

      button {
        width: 100%;
      }

      h1 {
        font-size: 26px;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>유튜브 제목 + 썸네일 생성기</h1>
      <p class="desc">영상 주제를 입력하면 제목과 썸네일 문구를 생성합니다.</p>

      <div class="input-group">
        <input
          type="text"
          id="topic"
          placeholder="예: 드라마 결말 리뷰, 고양이 쇼츠, 건강 정보"
        />
        <button onclick="generateContent()">생성하기</button>
      </div>

      <div id="result">
        <p class="empty">아직 생성된 결과가 없습니다.</p>
      </div>
    </div>
  </div>

 <script>
  async function generateContent() {
    const topic = document.getElementById("topic").value.trim();
    const result = document.getElementById("result");

    if (!topic) {
      alert("영상 주제를 입력해주세요.");
      return;
    }

    result.innerHTML = `<p class="empty">생성 중입니다...</p>`;

    try {
      const response = await fetch("http://localhost:3000/generate", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        body: JSON.stringify({ topic })
      });

      const data = await response.json();

      if (!response.ok) {
        result.innerHTML = `<p class="empty">${data.error || "오류가 발생했습니다."}</p>`;
        return;
      }

      result.innerHTML = `
        <div class="section">
          <h2>생성 결과</h2>
          <pre style="white-space: pre-wrap; line-height: 1.6; background:#f4f4f4; padding:16px; border-radius:10px;">${data.result}</pre>
        </div>
      `;
    } catch (error) {
      result.innerHTML = `<p class="empty">서버 연결에 실패했습니다.</p>`;
      console.error(error);
    }
  }
</script>
