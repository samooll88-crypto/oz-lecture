<!DOCTYPE html>
<html>
<head>
    <title>User Registration Form</title>
</head>
<body>

    <h1>User Registration</h1>

    <form action="#" method="POST">

        <p>
            <label for="name">Name:</label>
            <input type="text" id="name" name="name">
        </p>

        <p>
            <label for="email">Email:</label>
            <input type="email" id="email" name="email">
        </p>

        <p>
            <label for="password">Password:</label>
            <input type="password" id="password" name="password">
        </p>

        <p>
            <label for="birth">Birth Date:</label>
            <input type="date" id="birth" name="birth">
        </p>

        <p>
            <label for="age">Age:</label>
            <input type="number" id="age" name="age" min="18" max="100">
        </p>

        <p>
            <label for="satisfaction">Satisfaction:</label>
            <input type="range" id="satisfaction" name="satisfaction" min="1" max="10">
        </p>

        <p>
            Gender:
            <input type="radio" name="gender" value="Male"> Male
            <input type="radio" name="gender" value="Female"> Female
            <input type="radio" name="gender" value="Other"> Other
        </p>

        <p>
            Interests:
            <input type="checkbox" name="interest" value="walking"> walking
            <input type="checkbox" name="interest" value="Gaming"> Gaming
            <input type="checkbox" name="interest" value="Reading"> Reading
        </p>

        <p>
            <label for="country">Country:</label>
            <select id="country" name="country">
                <option value="kr">South Korea</option>
                <option value="us">USA</option>
                <option value="jp">Japan</option>
                <option value="cn">China</option>
                <option value="uk">UK</option>
            </select>
        </p>

        <p>
            <button type="submit">Submit</button>
            <button type="reset">Reset</button>
        </p>

    </form>

</body>
</html>
