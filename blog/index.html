<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>여행 블로그 자동 생성기</title>
  <style>
    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(135deg, #e0f2fe, #fef3c7);
      color: #1f2937;
    }

    .container {
      max-width: 1000px;
      margin: 40px auto;
      padding: 20px;
    }

    .card {
      background: white;
      border-radius: 20px;
      box-shadow: 0 12px 30px rgba(0, 0, 0, 0.12);
      padding: 24px;
      margin-bottom: 24px;
    }

    h1 {
      margin-top: 0;
      font-size: 34px;
      text-align: center;
      color: #0f172a;
    }

    .sub {
      text-align: center;
      color: #475569;
      margin-bottom: 30px;
    }

    .form-group {
      margin-bottom: 18px;
    }

    label {
      display: block;
      font-weight: bold;
      margin-bottom: 8px;
      color: #1e293b;
    }

    input, textarea {
      width: 100%;
      padding: 14px;
      border: 2px solid #cbd5e1;
      border-radius: 12px;
      font-size: 15px;
      outline: none;
      transition: 0.2s;
    }

    input:focus, textarea:focus {
      border-color: #3b82f6;
    }

    textarea {
      min-height: 120px;
      resize: vertical;
      line-height: 1.5;
    }

    .button-group {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin-top: 10px;
    }

    button {
      border: none;
      border-radius: 12px;
      padding: 14px 18px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: 0.2s;
    }

    button:hover {
      transform: translateY(-2px);
    }

    .generate-btn {
      background: #2563eb;
      color: white;
    }

    .sample-btn {
      background: #f59e0b;
      color: white;
    }

    .reset-btn {
      background: #8b5cf6;
      color: white;
    }

    .output-title {
      margin-top: 0;
      color: #0f172a;
    }

    .output-box {
      background: #f8fafc;
      border: 1px solid #e2e8f0;
      border-radius: 16px;
      padding: 20px;
      white-space: pre-wrap;
      line-height: 1.8;
      font-size: 15px;
    }

    .hint {
      font-size: 13px;
      color: #64748b;
      margin-top: 6px;
    }

    @media (max-width: 700px) {
      .container {
        margin: 20px auto;
        padding: 14px;
      }

      h1 {
        font-size: 28px;
      }
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="card">
      <h1>여행 블로그 자동 생성기</h1>
      <p class="sub">여행 상품 링크와 핵심 정보만 넣으면 블로그 초안을 자동으로 만들어줍니다.</p>

      <div class="form-group">
        <label for="travelLink">여행 상품 링크</label>
        <input type="text" id="travelLink" placeholder="예: https://www.modetour.com/package/100631449" />
      </div>

      <div class="form-group">
        <label for="productName">상품명 / 여행 이름</label>
        <input type="text" id="productName" placeholder="예: 홍콩 핵심투어+1일 자유 2박3일" />
      </div>

      <div class="form-group">
        <label for="summary">핵심 정보</label>
        <textarea id="summary" placeholder="예:
- 홍콩 2박3일
- 노쇼핑
- 출발확정
- 핵심투어 + 1일 자유
- 오전출발
- 처음 홍콩 가는 사람에게 추천"></textarea>
        <div class="hint">핵심 내용을 줄글이나 목록으로 적어도 됩니다.</div>
      </div>

      <div class="button-group">
        <button class="generate-btn" onclick="generatePost()">블로그 글 생성</button>
        <button class="sample-btn" onclick="fillSample()">샘플 넣기</button>
        <button class="reset-btn" onclick="resetForm()">초기화</button>
      </div>
    </div>

    <div class="card">
      <h2 class="output-title">생성 결과</h2>
      <div id="output" class="output-box">여기에 자동 생성된 블로그 글이 표시됩니다.</div>
    </div>
  </div>

  <script>
    function fillSample() {
      document.getElementById("travelLink").value = "https://www.modetour.com/package/100631449";
      document.getElementById("productName").value = "[출발확정] [노쇼핑] 홍콩 핵심투어+1일 자유 2박3일";
      document.getElementById("summary").value =
`- 홍콩 2박3일
- 노쇼핑
- 출발확정
- 핵심투어 + 1일 자유
- 오전출발
- 처음 홍콩 가는 사람에게 추천
- 짧은 일정으로 효율적인 여행 가능`;
    }

    function resetForm() {
      document.getElementById("travelLink").value = "";
      document.getElementById("productName").value = "";
      document.getElementById("summary").value = "";
      document.getElementById("output").textContent = "여기에 자동 생성된 블로그 글이 표시됩니다.";
    }

    function makeTitle(productName) {
      const titles = [
        `${productName}, 이렇게 가면 실패 없습니다`,
        `${productName} 여행 고민 중이라면 이 일정 괜찮습니다`,
        `${productName} 핵심만 딱 담은 여행`,
        `${productName} 처음 가는 분들에게 추천하는 이유`,
        `${productName} 일정, 생각보다 훨씬 괜찮네요`
      ];
      return titles;
    }

    function parseSummary(summary) {
      return summary
        .split("\n")
        .map(line => line.replace(/^- /, "").trim())
        .filter(line => line !== "");
    }

    function generatePost() {
      const travelLink = document.getElementById("travelLink").value.trim();
      const productName = document.getElementById("productName").value.trim();
      const summary = document.getElementById("summary").value.trim();
      const output = document.getElementById("output");

      if (!productName || !summary) {
        output.textContent = "상품명과 핵심 정보를 먼저 입력해 주세요.";
        return;
      }

      const points = parseSummary(summary);
      const titles = makeTitle(productName);

      const pointList = points.map(point => `- ${point}`).join("\n");
      const recommendList = points.slice(0, 3).map(point => `- ${point}`).join("\n");

      const hashtags = [
        "#여행추천",
        "#해외여행",
        "#패키지여행",
        "#여행블로그",
        "#여행정보",
        "#여행코스",
        "#자유여행",
        "#해외여행추천"
      ].join(" ");

      const result = `제목 추천 5개
1. ${titles[0]}
2. ${titles[1]}
3. ${titles[2]}
4. ${titles[3]}
5. ${titles[4]}

한눈에 요약
${productName} 상품은 여행 초보자도 부담 없이 접근할 수 있는 일정으로 보입니다.
핵심 관광과 실속 있는 동선이 함께 들어가 있어 짧은 일정 안에서도 알차게 여행을 즐기고 싶은 분들에게 잘 맞는 구성입니다.

여행 소개
여행지를 고를 때 가장 고민되는 건 “이 일정이 내 스타일에 맞을까?” 하는 부분이죠.
${productName} 상품은 복잡하게 계획을 짜지 않아도 핵심 포인트를 놓치지 않도록 구성된 여행이라는 점이 장점입니다.
특히 아래와 같은 특징이 있어서 처음 가는 분들이나 짧은 휴가를 효율적으로 쓰고 싶은 분들에게 매력적으로 느껴질 수 있습니다.

추천 포인트
${pointList}

이런 분들에게 추천
${recommendList}

간단 일정/느낌 정리
이 여행 상품은 전체 일정을 복잡하게 끌지 않고,
핵심 일정은 챙기면서도 여행의 부담은 줄인 형태로 보입니다.
짧은 기간 안에 효율적으로 다녀오고 싶은 분들에게 특히 잘 어울립니다.

마무리 한줄
짧은 일정 안에서도 핵심은 놓치지 않고 싶다면 한 번쯤 눈여겨볼 만한 여행 상품입니다.

원본 링크
${travelLink || "링크 없음"}

해시태그
${hashtags}`;

      output.textContent = result;
    }
  </script>
</body>
</html>
