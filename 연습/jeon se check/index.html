<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1"/>
  <title>전세사기 체크리스트</title>
  <link rel="stylesheet" href="styles.css" />
</head>

<body>
  <header class="header">
    <h1 class="title">전세사기 체크리스트</h1>
    <p class="subtitle">계약 전에 꼭 확인해야 할 것만 모았습니다. 체크하면 자동으로 위험도를 계산해요.</p>
<img class="hero-img" src="images/hero.png" alt="전세 계약 체크리스트 안내 이미지">  
</header>

  <main class="container">

    <!-- 요약 카드 -->
    <section class="card summary">
      <div class="summary-top">
        <div>
          <p class="label">진행률</p>
          <p class="big" id="progressText">0%</p>
        </div>

        <div>
          <p class="label">위험도</p>
          <p class="big" id="riskText">판단 전</p>
        </div>
      </div>

      <div class="progress">
        <div class="progress-bar" id="progressBar"></div>
      </div>

      <p class="hint" id="nextAction">
        체크를 시작하면 다음 행동 가이드가 나옵니다.
      </p>

      <div class="summary-actions">
        <button type="button" class="btn" id="resetBtn">전체 초기화</button>
        <button type="button" class="btn btn-outline" id="printBtn">저장/출력</button>
      </div>
    </section>

    <!-- 체크리스트 -->
    <section class="card">
      <h2 class="section-title">📄 1) 서류 / 권리 확인</h2>

      <label class="item">
        <input type="checkbox" data-weight="3" data-critical="true" id="c1">
        <span class="item-text">등기부등본(갑구/을구)을 확인했다</span>
        <span class="badge critical">핵심</span>
      </label>

      <label class="item">
        <input type="checkbox" data-weight="3" data-critical="true" id="c2">
        <span class="item-text">근저당/가압류/압류 등 권리침해 여부를 확인했다</span>
        <span class="badge critical">핵심</span>
      </label>

      <label class="item">
        <input type="checkbox" data-weight="2" id="c3">
        <span class="item-text">집주인(소유자) 신분증과 등기 명의가 일치한다</span>
        <span class="badge">중요</span>
      </label>

      <label class="item">
        <input type="checkbox" data-weight="2" id="c4">
        <span class="item-text">대리인 계약이면 위임장/인감증명서 등 서류를 확인했다</span>
        <span class="badge">중요</span>
      </label>
    </section>

    <section class="card">
      <h2 class="section-title">💰 2) 가격 / 리스크 체크</h2>

      <label class="item">
        <input type="checkbox" data-weight="2" id="c5">
        <span class="item-text">전세가가 주변 시세 대비 과하게 높지 않다</span>
        <span class="badge">중요</span>
      </label>

      <label class="item">
        <input type="checkbox" data-weight="3" data-critical="true" id="c6">
        <span class="item-text">보증금이 집값 대비 너무 높지 않은지(전세가율) 체크했다</span>
        <span class="badge critical">핵심</span>
      </label>

      <label class="item">
        <input type="checkbox" data-weight="1" id="c7">
        <span class="item-text">신축/갭투자 의심(단기간 다수 매물) 여부를 확인했다</span>
        <span class="badge">참고</span>
      </label>
    </section>

    <section class="card">
      <h2 class="section-title">🖊️ 3) 계약 / 입주 직전</h2>

      <label class="item">
        <input type="checkbox" data-weight="3" data-critical="true" id="c8">
        <span class="item-text">전입신고 가능 + 확정일자 받을 수 있는 조건인지 확인했다</span>
        <span class="badge critical">핵심</span>
      </label>

      <label class="item">
        <input type="checkbox" data-weight="2" id="c9">
        <span class="item-text">특약(근저당 말소, 전세보증보험 불가 시 계약 해지 등)을 넣었다</span>
        <span class="badge">중요</span>
      </label>

      <label class="item">
        <input type="checkbox" data-weight="2" id="c10">
        <span class="item-text">계약금/잔금은 명의자 계좌로 이체하고 증빙을 남긴다</span>
        <span class="badge">중요</span>
      </label>

      <p class="disclaimer">
        ※ 이 체크리스트는 일반 정보이며 법률/세무 자문이 아닙니다. 상황에 따라 전문가 상담이 필요할 수 있습니다.
      </p>
    </section>

  </main>

  <script src="app.js"></script>
</body>
</html>
