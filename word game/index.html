<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>영어 단어 빈칸 게임</title>
  <style>
    * {
      box-sizing: border-box;
    }

    :root {
      --bg1: #cfe8ff;
      --bg2: #fff4cf;
      --card: rgba(255, 255, 255, 0.94);
      --primary: #2563eb;
      --primary-dark: #1d4ed8;
      --green: #22c55e;
      --green-dark: #16a34a;
      --yellow: #f59e0b;
      --yellow-dark: #d97706;
      --purple: #8b5cf6;
      --purple-dark: #7c3aed;
      --red: #ef4444;
      --red-dark: #dc2626;
      --text: #1f2937;
      --sub: #6b7280;
      --shadow: 0 18px 40px rgba(0, 0, 0, 0.16);
      --radius: 24px;
    }

    body {
      margin: 0;
      font-family: Arial, sans-serif;
      min-height: 100vh;
      display: flex;
      justify-content: center;
      align-items: center;
      background:
        radial-gradient(circle at top left, rgba(255,255,255,0.8), transparent 30%),
        radial-gradient(circle at bottom right, rgba(255,255,255,0.7), transparent 35%),
        linear-gradient(135deg, var(--bg1), var(--bg2));
      padding: 20px;
    }

    .game-container {
      width: 100%;
      max-width: 600px;
      background: var(--card);
      backdrop-filter: blur(10px);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      padding: 30px 24px 26px;
      text-align: center;
      position: relative;
      overflow: hidden;
      border: 2px solid rgba(255, 255, 255, 0.7);
    }

    .game-container::before,
    .game-container::after {
      content: "";
      position: absolute;
      border-radius: 50%;
      z-index: 0;
      opacity: 0.18;
    }

    .game-container::before {
      width: 180px;
      height: 180px;
      background: #60a5fa;
      top: -60px;
      left: -50px;
    }

    .game-container::after {
      width: 150px;
      height: 150px;
      background: #fbbf24;
      bottom: -50px;
      right: -40px;
    }

    .content {
      position: relative;
      z-index: 1;
    }

    .title-badge {
      display: inline-block;
      background: #eff6ff;
      color: var(--primary-dark);
      font-weight: bold;
      border-radius: 999px;
      padding: 8px 14px;
      margin-bottom: 10px;
      font-size: 14px;
      box-shadow: 0 6px 12px rgba(37, 99, 235, 0.08);
    }

    h1 {
      margin: 0 0 10px;
      font-size: 34px;
      color: var(--text);
      letter-spacing: -1px;
    }

    .sub-title {
      margin: 0 0 20px;
      color: var(--sub);
      font-size: 15px;
      line-height: 1.5;
    }

    .start-area {
      margin-bottom: 20px;
    }

    .start-btn {
      background: linear-gradient(180deg, var(--primary), var(--primary-dark));
      color: white;
      padding: 14px 24px;
      border: none;
      border-radius: 16px;
      font-size: 18px;
      font-weight: 900;
      cursor: pointer;
      box-shadow: 0 12px 20px rgba(37, 99, 235, 0.2);
      transition: transform 0.15s ease, opacity 0.15s ease;
    }

    .start-btn:hover {
      transform: translateY(-2px);
      opacity: 0.97;
    }

    .info-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 12px;
      margin-bottom: 18px;
    }

    .info-box {
      background: linear-gradient(180deg, #ffffff, #eef6ff);
      border-radius: 18px;
      padding: 14px 10px;
      box-shadow: 0 8px 16px rgba(0, 0, 0, 0.06);
      border: 1px solid #e5eefb;
    }

    .info-label {
      font-size: 12px;
      color: var(--sub);
      margin-bottom: 6px;
      font-weight: bold;
    }

    .info-value {
      font-size: 24px;
      color: var(--text);
      font-weight: 900;
    }

    .timer-bar-wrap {
      width: 100%;
      height: 18px;
      background: #e5e7eb;
      border-radius: 999px;
      overflow: hidden;
      margin: 12px 0 20px;
      box-shadow: inset 0 2px 5px rgba(0,0,0,0.08);
    }

    .timer-bar {
      height: 100%;
      width: 100%;
      background: linear-gradient(90deg, #38bdf8, #2563eb);
      transition: width 1s linear;
      border-radius: 999px;
    }

    .question-card {
      background: linear-gradient(180deg, #f8fbff, #eef7ff);
      border: 1px solid #dbeafe;
      border-radius: 22px;
      padding: 22px 16px;
      margin-bottom: 16px;
      box-shadow: 0 10px 20px rgba(37, 99, 235, 0.08);
    }

    .question-label {
      font-size: 16px;
      color: var(--sub);
      margin-bottom: 10px;
      font-weight: bold;
    }

    .question {
      font-size: 42px;
      letter-spacing: 6px;
      font-weight: 900;
      color: var(--primary-dark);
      min-height: 52px;
      margin-bottom: 10px;
      word-break: break-word;
    }

    .meaning {
      display: inline-block;
      background: #fff7ed;
      color: #c2410c;
      font-size: 18px;
      font-weight: bold;
      padding: 10px 16px;
      border-radius: 999px;
      margin-bottom: 12px;
      box-shadow: 0 8px 15px rgba(245, 158, 11, 0.12);
    }

    .hint {
      font-size: 15px;
      color: var(--sub);
      margin-top: 6px;
      min-height: 20px;
    }

    .input-wrap {
      margin: 20px 0 12px;
    }

    input {
      width: 140px;
      padding: 14px 12px;
      font-size: 28px;
      text-align: center;
      border: 3px solid #93c5fd;
      border-radius: 18px;
      outline: none;
      background: #fff;
      color: var(--text);
      font-weight: bold;
      box-shadow: inset 0 3px 8px rgba(0,0,0,0.04);
      transition: all 0.2s ease;
    }

    input:focus {
      border-color: var(--primary);
      transform: scale(1.04);
      box-shadow: 0 0 0 6px rgba(37, 99, 235, 0.12);
    }

    input:disabled {
      background: #f3f4f6;
      color: #9ca3af;
      cursor: not-allowed;
    }

    .button-group {
      margin-top: 16px;
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 10px;
    }

    button {
      padding: 14px 12px;
      font-size: 15px;
      font-weight: 900;
      border: none;
      border-radius: 16px;
      cursor: pointer;
      transition: transform 0.15s ease, box-shadow 0.15s ease, opacity 0.15s ease;
      box-shadow: 0 10px 18px rgba(0, 0, 0, 0.10);
    }

    button:hover {
      transform: translateY(-2px);
      opacity: 0.97;
    }

    button:active {
      transform: translateY(1px);
    }

    .check-btn {
      background: linear-gradient(180deg, var(--green), var(--green-dark));
      color: white;
    }

    .next-btn {
      background: linear-gradient(180deg, #fbbf24, var(--yellow-dark));
      color: #222;
    }

    .restart-btn {
      background: linear-gradient(180deg, var(--purple), var(--purple-dark));
      color: white;
    }

    .end-btn {
      background: linear-gradient(180deg, var(--red), var(--red-dark));
      color: white;
    }

    .speak-btn {
      background: linear-gradient(180deg, #06b6d4, #0891b2);
      color: white;
    }

    .result {
      margin-top: 18px;
      min-height: 56px;
      font-size: 24px;
      font-weight: 900;
      display: flex;
      justify-content: center;
      align-items: center;
      border-radius: 16px;
      padding: 10px 14px;
      background: #f9fafb;
      line-height: 1.5;
    }

    .guide {
      margin-top: 18px;
      font-size: 13px;
      color: var(--sub);
      line-height: 1.6;
      background: #f8fafc;
      border-radius: 14px;
      padding: 10px 12px;
    }

    .fireworks {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
      z-index: 3;
    }

    .particle {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      animation: explode 900ms ease-out forwards;
      opacity: 1;
    }

    @keyframes explode {
      0% {
        transform: translate(0, 0) scale(1);
        opacity: 1;
      }
      100% {
        transform: translate(var(--x), var(--y)) scale(0.2);
        opacity: 0;
      }
    }

    @media (max-width: 850px) {
      .button-group {
        grid-template-columns: repeat(2, 1fr);
      }
    }

    @media (max-width: 600px) {
      .game-container {
        padding: 24px 16px 20px;
      }

      h1 {
        font-size: 28px;
      }

      .info-row {
        grid-template-columns: 1fr;
      }

      .question {
        font-size: 34px;
        letter-spacing: 4px;
      }

      .button-group {
        grid-template-columns: 1fr;
      }

      input {
        width: 120px;
        font-size: 24px;
      }

      .meaning {
        font-size: 16px;
      }
    }
  </style>
</head>
<body>
  <div class="game-container">
    <div class="fireworks" id="fireworks"></div>

    <div class="content">
      <div class="title-badge">초등 영어 게임</div>
      <h1>영어 단어 빈칸 게임</h1>
      <p class="sub-title">뜻을 보고 빈칸에 들어갈 알파벳을 맞혀보세요!</p>

      <div class="start-area">
        <button id="startBtn" class="start-btn" onclick="startGame()">게임 시작</button>
      </div>

      <div class="info-row">
        <div class="info-box">
          <div class="info-label">점수</div>
          <div class="info-value" id="score">0</div>
        </div>
        <div class="info-box">
          <div class="info-label">문제 번호</div>
          <div class="info-value" id="questionNumber">0</div>
        </div>
        <div class="info-box">
          <div class="info-label">남은 시간</div>
          <div class="info-value"><span id="time">10</span>초</div>
        </div>
      </div>

      <div class="timer-bar-wrap">
        <div class="timer-bar" id="timerBar"></div>
      </div>

      <div class="question-card">
        <div class="question-label">빈칸에 들어갈 글자를 맞혀보세요!</div>
        <div class="question" id="question">게임 시작 버튼을 눌러주세요</div>
        <div class="meaning" id="meaning">뜻: 준비 중</div>
        <div class="hint" id="hint">힌트가 여기에 표시됩니다.</div>
      </div>

      <div class="input-wrap">
        <input type="text" id="answerInput" maxlength="1" placeholder="한 글자" disabled />
      </div>

      <div class="button-group">
        <button class="check-btn" onclick="checkAnswer()">정답 확인</button>
        <button class="next-btn" onclick="nextQuestion()">다음 문제</button>
        <button class="speak-btn" onclick="speakCurrentWord()">다시 듣기</button>
        <button class="restart-btn" onclick="restartGame()">처음부터</button>
        <button class="end-btn" onclick="endGame()">게임 끝내기</button>
      </div>

      <div class="result" id="result">게임을 시작해 보세요!</div>

      <div class="guide">
        Enter 키를 눌러도 정답 확인이 됩니다. 정답을 맞히면 영어 발음이 자동으로 재생됩니다.
      </div>
    </div>
  </div>

  <script>
    const words = [
      { word: "apple", meaning: "사과" },
      { word: "banana", meaning: "바나나" },
      { word: "orange", meaning: "오렌지" },
      { word: "grape", meaning: "포도" },
      { word: "peach", meaning: "복숭아" },
      { word: "melon", meaning: "멜론" },
      { word: "lemon", meaning: "레몬" },
      { word: "mango", meaning: "망고" },
      { word: "pear", meaning: "배" },
      { word: "plum", meaning: "자두" },

      { word: "cat", meaning: "고양이" },
      { word: "dog", meaning: "개" },
      { word: "pig", meaning: "돼지" },
      { word: "cow", meaning: "소" },
      { word: "hen", meaning: "암탉" },
      { word: "duck", meaning: "오리" },
      { word: "bird", meaning: "새" },
      { word: "fish", meaning: "물고기" },
      { word: "frog", meaning: "개구리" },
      { word: "bear", meaning: "곰" },
      { word: "lion", meaning: "사자" },
      { word: "tiger", meaning: "호랑이" },
      { word: "monkey", meaning: "원숭이" },
      { word: "rabbit", meaning: "토끼" },
      { word: "horse", meaning: "말" },

      { word: "red", meaning: "빨간색" },
      { word: "blue", meaning: "파란색" },
      { word: "green", meaning: "초록색" },
      { word: "pink", meaning: "분홍색" },
      { word: "black", meaning: "검은색" },
      { word: "white", meaning: "하얀색" },
      { word: "yellow", meaning: "노란색" },
      { word: "brown", meaning: "갈색" },
      { word: "purple", meaning: "보라색" },
      { word: "gray", meaning: "회색" },

      { word: "sun", meaning: "해" },
      { word: "moon", meaning: "달" },
      { word: "star", meaning: "별" },
      { word: "sky", meaning: "하늘" },
      { word: "cloud", meaning: "구름" },
      { word: "rain", meaning: "비" },
      { word: "snow", meaning: "눈" },
      { word: "wind", meaning: "바람" },
      { word: "tree", meaning: "나무" },
      { word: "flower", meaning: "꽃" },
      { word: "leaf", meaning: "잎" },
      { word: "grass", meaning: "풀" },
      { word: "river", meaning: "강" },
      { word: "sea", meaning: "바다" },
      { word: "rock", meaning: "바위" },

      { word: "book", meaning: "책" },
      { word: "pen", meaning: "펜" },
      { word: "pencil", meaning: "연필" },
      { word: "eraser", meaning: "지우개" },
      { word: "ruler", meaning: "자" },
      { word: "bag", meaning: "가방" },
      { word: "desk", meaning: "책상" },
      { word: "chair", meaning: "의자" },
      { word: "paper", meaning: "종이" },
      { word: "map", meaning: "지도" },
      { word: "door", meaning: "문" },
      { word: "window", meaning: "창문" },
      { word: "clock", meaning: "시계" },
      { word: "phone", meaning: "전화기" },
      { word: "table", meaning: "테이블" },

      { word: "ball", meaning: "공" },
      { word: "kite", meaning: "연" },
      { word: "robot", meaning: "로봇" },
      { word: "doll", meaning: "인형" },
      { word: "toy", meaning: "장난감" },
      { word: "car", meaning: "자동차" },
      { word: "bus", meaning: "버스" },
      { word: "train", meaning: "기차" },
      { word: "bike", meaning: "자전거" },
      { word: "boat", meaning: "보트" },

      { word: "bread", meaning: "빵" },
      { word: "rice", meaning: "쌀 / 밥" },
      { word: "milk", meaning: "우유" },
      { word: "water", meaning: "물" },
      { word: "juice", meaning: "주스" },
      { word: "egg", meaning: "달걀" },
      { word: "cake", meaning: "케이크" },
      { word: "cookie", meaning: "쿠키" },
      { word: "candy", meaning: "사탕" },
      { word: "soup", meaning: "수프" },

      { word: "hand", meaning: "손" },
      { word: "foot", meaning: "발" },
      { word: "nose", meaning: "코" },
      { word: "eye", meaning: "눈" },
      { word: "face", meaning: "얼굴" },
      { word: "hair", meaning: "머리카락" },
      { word: "ear", meaning: "귀" },
      { word: "mouth", meaning: "입" },
      { word: "arm", meaning: "팔" },
      { word: "leg", meaning: "다리" }
    ];

    let currentWord = "";
    let currentMeaning = "";
    let blankIndex = 0;
    let score = 0;
    let questionNumber = 0;
    let timeLeft = 10;
    let timer = null;
    let answered = false;
    let gameStarted = false;

    const questionEl = document.getElementById("question");
    const meaningEl = document.getElementById("meaning");
    const hintEl = document.getElementById("hint");
    const resultEl = document.getElementById("result");
    const scoreEl = document.getElementById("score");
    const questionNumberEl = document.getElementById("questionNumber");
    const timeEl = document.getElementById("time");
    const answerInput = document.getElementById("answerInput");
    const timerBar = document.getElementById("timerBar");
    const fireworksEl = document.getElementById("fireworks");
    const startBtn = document.getElementById("startBtn");

    function makeQuestion(word) {
      blankIndex = Math.floor(Math.random() * word.length);
      return word.substring(0, blankIndex) + "_" + word.substring(blankIndex + 1);
    }

    function getHint(word) {
      return `힌트: 이 단어는 ${word.length}글자예요.`;
    }

    function setResult(message, color, background) {
      resultEl.innerHTML = message;
      resultEl.style.color = color;
      resultEl.style.background = background;
    }

    function speakWord(word) {
      if (!word) return;

      speechSynthesis.cancel();

      const utterance = new SpeechSynthesisUtterance(word);
      utterance.lang = "en-US";
      utterance.rate = 0.9;
      utterance.pitch = 1;
      utterance.volume = 1;

      speechSynthesis.speak(utterance);
    }

    function speakCurrentWord() {
      if (!gameStarted || !currentWord) {
        setResult("게임을 시작한 뒤에 단어를 들을 수 있어요!", "#374151", "#f9fafb");
        return;
      }
      speakWord(currentWord);
    }

    function startTimer() {
      clearInterval(timer);
      timeLeft = 10;
      timeEl.textContent = timeLeft;
      timerBar.style.width = "100%";

      timer = setInterval(() => {
        timeLeft--;
        timeEl.textContent = timeLeft;
        timerBar.style.width = `${timeLeft * 10}%`;

        if (timeLeft <= 0) {
          clearInterval(timer);
          if (!answered && gameStarted) {
            answered = true;
            setResult(`시간 초과! 정답은 "${currentWord[blankIndex]}" 입니다.`, "#ef4444", "#fee2e2");
          }
        }
      }, 1000);
    }

    function startGame() {
      if (gameStarted) return;

      gameStarted = true;
      score = 0;
      questionNumber = 0;
      scoreEl.textContent = score;
      questionNumberEl.textContent = questionNumber;
      answerInput.disabled = false;
      answerInput.focus();
      startBtn.style.display = "none";
      nextQuestion();
    }

    function nextQuestion() {
      if (!gameStarted) return;

      clearInterval(timer);
      answered = false;
      answerInput.value = "";
      answerInput.focus();

      const randomIndex = Math.floor(Math.random() * words.length);
      const selectedWord = words[randomIndex];

      currentWord = selectedWord.word;
      currentMeaning = selectedWord.meaning;

      questionEl.textContent = makeQuestion(currentWord);
      meaningEl.textContent = `뜻: ${currentMeaning}`;
      hintEl.textContent = getHint(currentWord);

      questionNumber++;
      questionNumberEl.textContent = questionNumber;

      setResult("문제를 잘 보고 정답을 맞혀보세요!", "#374151", "#f9fafb");

      startTimer();
    }

    function checkAnswer() {
      if (!gameStarted || answered) return;

      const userInput = answerInput.value.trim().toLowerCase();

      if (userInput === "") {
        setResult("한 글자를 입력해 주세요!", "#d97706", "#fef3c7");
        return;
      }

      if (userInput === currentWord[blankIndex].toLowerCase()) {
        score++;
        scoreEl.textContent = score;
        answered = true;
        clearInterval(timer);
        setResult("정답입니다! 🎉 단어를 읽어드릴게요.", "#15803d", "#dcfce7");
        createFireworks();
        speakWord(currentWord);
      } else {
        setResult("틀렸어요! 다시 생각해 보세요.", "#b91c1c", "#fee2e2");
      }
    }

    function restartGame() {
      clearInterval(timer);
      speechSynthesis.cancel();
      gameStarted = false;
      score = 0;
      questionNumber = 0;
      scoreEl.textContent = score;
      questionNumberEl.textContent = questionNumber;
      timeLeft = 10;
      timeEl.textContent = timeLeft;
      timerBar.style.width = "100%";
      answerInput.value = "";
      answerInput.disabled = true;
      questionEl.textContent = "게임 시작 버튼을 눌러주세요";
      meaningEl.textContent = "뜻: 준비 중";
      hintEl.textContent = "힌트가 여기에 표시됩니다.";
      setResult("게임을 다시 시작할 수 있어요!", "#374151", "#f9fafb");
      startBtn.style.display = "inline-block";
    }

    function endGame() {
      clearInterval(timer);
      speechSynthesis.cancel();

      if (!gameStarted) {
        setResult("아직 시작하지 않았어요!", "#374151", "#f9fafb");
        return;
      }

      gameStarted = false;
      answerInput.disabled = true;
      questionEl.textContent = "게임 종료";
      meaningEl.textContent = "수고했어요!";
      hintEl.textContent = "";
      setResult(`최종 점수: ${score}점<br>다시 하려면 게임 시작 또는 처음부터를 눌러주세요.`, "#1d4ed8", "#dbeafe");
      startBtn.style.display = "inline-block";
    }

    function createFireworks() {
      fireworksEl.innerHTML = "";

      for (let i = 0; i < 30; i++) {
        const particle = document.createElement("div");
        particle.classList.add("particle");

        const centerX = 50 + Math.random() * 20 - 10;
        const centerY = 40 + Math.random() * 20 - 10;

        particle.style.left = `${centerX}%`;
        particle.style.top = `${centerY}%`;

        const moveX = (Math.random() - 0.5) * 240 + "px";
        const moveY = (Math.random() - 0.5) * 240 + "px";

        particle.style.setProperty("--x", moveX);
        particle.style.setProperty("--y", moveY);

        const colors = [
          "#ff4d6d", "#ffb703", "#00b4d8", "#90be6d",
          "#9b5de5", "#f15bb5", "#fb8500", "#3a86ff"
        ];
        particle.style.background = colors[Math.floor(Math.random() * colors.length)];

        fireworksEl.appendChild(particle);
      }

      setTimeout(() => {
        fireworksEl.innerHTML = "";
      }, 900);
    }

    answerInput.addEventListener("keydown", function(event) {
      if (!gameStarted) return;

      if (event.key === "Enter") {
        checkAnswer();
      }
    });

    restartGame();
  </script>
</body>
</html>
